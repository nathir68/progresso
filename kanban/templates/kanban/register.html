{% extends 'kanban/base.html' %}

{% block content %}
<div class="form-container">
    <h2>Sign up for Progresso</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <small style="color: var(--danger-color); display: block; margin-top: 0.25rem;">{{ field.errors|striptags }}</small>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; color: var(--text-secondary);">
        Already have an account? <a href="{% url 'login' %}" style="color: var(--accent-color);">Login</a>
    </p>
</div>
{% endblock %}
